name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint (eslint + module boundaries)
        run: npm run lint

      - name: Prisma generate (sqlite client)
        run: npx prisma generate --schema prisma/schema.prisma

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "file:./ci.db"
          NEXT_PUBLIC_BRAND: "borough"

      - name: Prisma validate (sqlite)
        run: npx prisma validate --schema prisma/schema.prisma
        env:
          DATABASE_URL: "file:./ci.db"

      - name: Prisma validate (postgres)
        run: npx prisma validate --schema prisma/schema.postgres.prisma
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
          DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Migration timestamp collision check
        run: |
          dupes=$(ls prisma/migrations | grep -E '^[0-9]{14}_' | cut -c1-14 | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "✋ 중복 마이그레이션 타임스탬프: $dupes"
            exit 1
          fi
          echo "마이그레이션 타임스탬프 충돌 없음"
