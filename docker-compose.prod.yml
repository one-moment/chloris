services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mattermost_mvp
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mattermost -d mattermost_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      args:
        PRISMA_SCHEMA: prisma/schema.postgres.prisma
    environment:
      DATABASE_URL: postgresql://mattermost:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/mattermost_mvp?schema=public
      ALLOW_PUBLIC_SIGNUP: ${ALLOW_PUBLIC_SIGNUP:-false}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-inline}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?set APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
